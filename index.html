<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · FlowForge</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f4f6fb;
      color: #1f2937;
    }

    .wrap {
      width: min(420px, 92%);
      margin: 40px auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: 600;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 14px;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 8px;
      font-size: 14px;
    }

    button:hover {
      opacity: 0.92;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 4px 0 12px;
      flex-wrap: wrap;
    }

    .option-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: normal;
      margin: 0;
    }

    .option-row input {
      width: auto;
      margin: 0;
      padding: 0;
    }

    #msg {
      margin-top: 18px;
      min-height: 26px;
      white-space: pre-wrap;
      font-weight: 600;
      font-size: 14px;
      line-height: 1.45;
    }

    #msg.msg-error {
      color: #b91c1c;
    }

    #msg.msg-success {
      color: #15803d;
    }

    #loginBtn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>登录 FlowForge</h1>

      <label>邮箱</label>
      <input id="email" type="email" placeholder="请输入邮箱" autocomplete="username" />

      <label>密码</label>
      <input id="password" type="password" placeholder="请输入密码" autocomplete="current-password" />

      <div class="option-row">
        <label>
          <input id="rememberMe" type="checkbox" />
          记住我
        </label>
        <label>
          <input id="showPassword" type="checkbox" />
          密码可见
        </label>
      </div>

      <button type="button" id="loginBtn">登录</button>

      <div id="msg" role="status" aria-live="polite">正在加载…</div>
    </div>
  </div>

  <script type="module">
    (async function initLoginPage() {
    const AFTER_LOGIN = './MindTask.html';
    const REMEMBER_EMAIL_KEY = 'flowforge_remember_email';

    const msgEl = document.getElementById('msg');

    function setMsg(text, kind) {
      if (!msgEl) return;
      msgEl.textContent = text;
      msgEl.classList.toggle('msg-error', kind === 'error');
      msgEl.classList.toggle('msg-success', kind === 'success');
    }

    /** 统一错误展示：错误：<场景>：<简要原因>，便于对照日志排查 */
    function setErr(scene, reason) {
      const r = String(reason ?? '').trim() || '未知原因';
      setMsg('错误：' + scene + '：' + r, 'error');
    }

    function looksLikeNetworkError(err) {
      const m = String(err?.message || err || '');
      return /fetch|network|Failed to fetch|Load failed|ECONNREFUSED|timed?\s*out|abort/i.test(m);
    }

    function briefFromError(err, fallback) {
      if (looksLikeNetworkError(err)) {
        return '疑似网络问题（' + (err?.message || '连接失败') + '）';
      }
      return fallback || String(err?.message || err);
    }

    if (location.protocol === 'file:') {
      setErr(
        '页面访问方式',
        '请用 http(s) 打开本页，勿用 file://（否则无法加载 ES Module）'
      );
      return;
    }

    let supabase;
    try {
      const mod = await import('./supabase-client.js');
      supabase = mod.supabase;
      if (!supabase) throw new Error('supabase-client 未导出 supabase');
    } catch (e) {
      console.error(e);
      setErr('加载登录依赖', briefFromError(e, String(e?.message || e)));
      return;
    }

    const loginBtn = document.getElementById('loginBtn');
    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const rememberMeEl = document.getElementById('rememberMe');
    const showPasswordEl = document.getElementById('showPassword');

    if (!loginBtn || !emailEl || !passwordEl) {
      setErr('页面结构', '缺少登录表单所需 DOM（如 #loginBtn）');
      return;
    }

    function loadRememberedEmail() {
      if (!rememberMeEl) return;
      const rememberedEmail = localStorage.getItem(REMEMBER_EMAIL_KEY);
      if (rememberedEmail) {
        emailEl.value = rememberedEmail;
        rememberMeEl.checked = true;
      }
    }

    try {
      setMsg('正在初始化…');
      if (showPasswordEl) {
        showPasswordEl.addEventListener('change', () => {
          passwordEl.type = showPasswordEl.checked ? 'text' : 'password';
        });
      }
      loadRememberedEmail();

      loginBtn.addEventListener('click', async () => {
        setMsg('正在校验输入…');
        msgEl.classList.remove('msg-error', 'msg-success');

        try {
          loginBtn.disabled = true;

          const email = emailEl.value.trim();
          const password = passwordEl.value.trim();

          if (!email || !password) {
            setErr('输入校验', '邮箱和密码不能为空');
            return;
          }

          setMsg('正在连接服务器…');

          const { error } = await supabase.auth.signInWithPassword({
            email,
            password
          });

          if (error) {
            const bits = [error.message || '登录被拒绝'];
            if (error.status != null) bits.push('HTTP ' + error.status);
            if (error.code) bits.push('code ' + error.code);
            setErr('登录未通过', bits.join('，'));
            return;
          }

          if (rememberMeEl?.checked) {
            localStorage.setItem(REMEMBER_EMAIL_KEY, email);
          } else {
            localStorage.removeItem(REMEMBER_EMAIL_KEY);
          }

          setMsg('登录成功，正在跳转…', 'success');
          window.location.href = AFTER_LOGIN;
        } catch (e) {
          console.error(e);
          setErr('登录请求异常', briefFromError(e, String(e?.message || e)));
        } finally {
          loginBtn.disabled = false;
        }
      });

      supabase.auth.onAuthStateChange((event) => {
        if (event === 'SIGNED_IN') {
          setTimeout(() => {
            window.location.href = AFTER_LOGIN;
          }, 0);
        }
      });

      const { data: sessionData, error: sessionError } =
        await supabase.auth.getSession();
      if (sessionError) {
        setErr('会话检查', sessionError.message || 'getSession 返回 error');
      } else if (sessionData.session?.user) {
        setMsg('已登录，正在进入…', 'success');
        window.location.href = AFTER_LOGIN;
      } else {
        setMsg('当前未登录，请输入邮箱和密码后点击登录');
      }
    } catch (err) {
      console.error(err);
      setErr('页面初始化', briefFromError(err, String(err?.message || err)));
    }
    })();
  </script>
</body>
</html>

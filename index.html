<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 · FlowForge</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f4f6fb;
      color: #1f2937;
    }

    .wrap {
      width: min(700px, 92%);
      margin: 40px auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 14px;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 8px;
      font-size: 14px;
    }

    button:hover {
      opacity: 0.92;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 4px 0 12px;
      flex-wrap: wrap;
    }

    .option-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: normal;
      margin: 0;
    }

    .option-row input {
      width: auto;
      margin: 0;
      padding: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    #scheduleOutput {
      margin-top: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 140px;
    }

    #scheduleList {
      margin-top: 10px;
    }

    .schedule-item {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      background: #fff;
      margin-bottom: 10px;
    }

    .schedule-item-title {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 700;
    }

    .schedule-item-meta {
      margin: 4px 0;
      color: #374151;
      font-size: 14px;
    }

    #msg {
      margin-top: 16px;
      min-height: 24px;
      white-space: pre-wrap;
      font-weight: 600;
    }

    #msg.msg-error {
      color: #b91c1c;
    }

    #loginBtn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .debug-wrap {
      margin-top: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 8px 12px;
      background: #f8fafc;
    }

    .debug-wrap summary {
      cursor: pointer;
      font-size: 13px;
      color: #64748b;
      user-select: none;
    }

    #initDebug {
      margin: 8px 0 0;
      padding: 10px;
      background: #0f172a;
      color: #e2e8f0;
      border-radius: 8px;
      font-size: 11px;
      line-height: 1.5;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, Menlo, Consolas, monospace;
    }

    .box {
      margin-top: 20px;
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fafafa;
    }

    .tip {
      font-size: 13px;
      color: #6b7280;
      margin-top: -8px;
      margin-bottom: 12px;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>登录 FlowForge</h1>

      <label>邮箱</label>
      <input id="email" type="email" placeholder="请输入邮箱" />

      <label>密码</label>
      <input id="password" type="password" placeholder="请输入密码" />

      <div class="option-row">
        <label>
          <input id="rememberMe" type="checkbox" />
          记住我
        </label>
        <label>
          <input id="showPassword" type="checkbox" />
          密码可见
        </label>
      </div>

      <button type="button" id="loginBtn">登录</button>
      <button type="button" id="logoutBtn">退出登录</button>
      <button type="button" id="readScheduleBtn">读取我的日程</button>

      <div class="box">
        <h3 style="margin-top: 0;">新增测试日程</h3>

        <label>日程标题</label>
        <input id="title" type="text" placeholder="例如：和同事开会" />

        <div class="grid">
          <div>
            <label>开始时间</label>
            <input id="startAt" type="datetime-local" />
          </div>
          <div>
            <label>结束时间</label>
            <input id="endAt" type="datetime-local" />
          </div>
        </div>

        <label>备注</label>
        <textarea id="note" placeholder="可选，例如：讨论下周安排"></textarea>

        <div class="tip">如果你不填，系统会自动帮你生成一个测试日程。</div>

        <button type="button" id="addScheduleBtn">新增测试日程</button>
      </div>

      <div id="msg" role="status" aria-live="polite">正在加载…</div>
      <details class="debug-wrap" open>
        <summary>排错日志（若点击登录无反应，请看这里）</summary>
        <pre id="initDebug">（尚未写入）</pre>
      </details>

      <div class="box">
        <h3 style="margin-top: 0;">我的日程</h3>
        <div id="scheduleList">暂无日程</div>
      </div>

      <div class="box">
        <h3 style="margin-top: 0;">调试输出</h3>
        <pre id="scheduleOutput">日程读取结果会显示在这里</pre>
      </div>
    </div>
  </div>

  <script type="module">
    (async function initLoginPage() {
    /** GitHub Pages 路径区分大小写，必须与仓库内文件名一致 */
    const AFTER_LOGIN = './MindTask.html';
    const REMEMBER_EMAIL_KEY = 'flowforge_remember_email';

    const msgEl = document.getElementById('msg');
    const debugEl = document.getElementById('initDebug');
    const ts = () => new Date().toISOString().slice(11, 23);

    function appendDebug(line) {
      const s = `[${ts()}] ${line}`;
      console.log('[login]', s);
      if (debugEl) {
        const prev = debugEl.textContent;
        debugEl.textContent =
          prev === '（尚未写入）' ? s : `${prev}\n${s}`;
        debugEl.scrollTop = debugEl.scrollHeight;
      }
    }

    function setMsg(text, kind) {
      if (!msgEl) return;
      msgEl.textContent = text;
      msgEl.classList.toggle('msg-error', kind === 'error');
    }

    appendDebug(`页面: protocol=${location.protocol} pathname=${location.pathname}`);

    if (location.protocol === 'file:') {
      appendDebug(
        '⚠ 当前为 file:// 打开。多数浏览器无法从本地文件加载相邻的 ES Module，整段脚本可能未执行。请用：npx serve . 或 python3 -m http.server，再打开 http://localhost:…/index.html'
      );
      setMsg(
        '检测到用「本地文件」方式打开页面。请改为通过 HTTP 访问（否则登录脚本可能根本不会运行）。',
        'error'
      );
    }

    let supabase;
    try {
      appendDebug('动态 import ./supabase-client.js …');
      const mod = await import('./supabase-client.js');
      supabase = mod.supabase;
      if (!supabase) throw new Error('supabase-client 未导出 supabase');
      appendDebug('supabase-client 加载成功');
    } catch (e) {
      console.error(e);
      appendDebug(`import 失败: ${e?.message || e}\n${e?.stack || ''}`);
      setMsg(
        '无法加载 supabase-client.js：' + (e?.message || e) + '（详情见下方排错日志）',
        'error'
      );
      return;
    }

    const scheduleOutputEl = document.getElementById('scheduleOutput');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const addScheduleBtn = document.getElementById('addScheduleBtn');
    const readScheduleBtn = document.getElementById('readScheduleBtn');
    const scheduleListEl = document.getElementById('scheduleList');

    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const rememberMeEl = document.getElementById('rememberMe');
    const showPasswordEl = document.getElementById('showPassword');

    const titleEl = document.getElementById('title');
    const startAtEl = document.getElementById('startAt');
    const endAtEl = document.getElementById('endAt');
    const noteEl = document.getElementById('note');

    if (
      !loginBtn ||
      !logoutBtn ||
      !addScheduleBtn ||
      !readScheduleBtn ||
      !emailEl ||
      !passwordEl ||
      !scheduleOutputEl ||
      !scheduleListEl
    ) {
      appendDebug('错误：缺少关键 DOM（按钮或 schedule 区域）');
      setMsg('页面结构异常，无法绑定登录。请确认 index.html 未被截断。', 'error');
      return;
    }

    let currentUser = null;

    function setScheduleOutput(text) {
      scheduleOutputEl.textContent = text;
    }

    function loadRememberedEmail() {
      if (!rememberMeEl) return;
      const rememberedEmail = localStorage.getItem(REMEMBER_EMAIL_KEY);
      if (rememberedEmail) {
        emailEl.value = rememberedEmail;
        rememberMeEl.checked = true;
      }
    }

    // 给 datetime-local 输入框设置默认时间
    function formatForDatetimeLocal(date) {
      const pad = (n) => String(n).padStart(2, '0');
      const year = date.getFullYear();
      const month = pad(date.getMonth() + 1);
      const day = pad(date.getDate());
      const hours = pad(date.getHours());
      const minutes = pad(date.getMinutes());
      return `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    function setDefaultScheduleForm() {
      const now = new Date();
      const oneHourLater = new Date(now.getTime() + 60 * 60 * 1000);

      titleEl.value = `测试日程 ${now.toLocaleString('zh-CN')}`;
      startAtEl.value = formatForDatetimeLocal(now);
      endAtEl.value = formatForDatetimeLocal(oneHourLater);
      noteEl.value = '这是测试页自动生成的测试日程';
    }

    function toIsoString(localDatetimeValue) {
      if (!localDatetimeValue) return null;
      return new Date(localDatetimeValue).toISOString();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatDisplayTime(value) {
      if (!value) return '未设置';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '未设置';
      const pad = (n) => String(n).padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function renderScheduleList(items) {
      if (!Array.isArray(items) || items.length === 0) {
        scheduleListEl.innerHTML = '<div class="schedule-item-meta">暂无日程</div>';
        return;
      }

      scheduleListEl.innerHTML = items.map((item) => {
        const title = item.title ? escapeHtml(item.title) : '未命名日程';
        const startAt = formatDisplayTime(item.start_at);
        const endAt = item.end_at ? formatDisplayTime(item.end_at) : '未设置结束时间';
        const note = item.note ? escapeHtml(item.note) : '无备注';

        return `
          <div class="schedule-item">
            <h4 class="schedule-item-title">${title}</h4>
            <div class="schedule-item-meta">开始：${startAt}</div>
            <div class="schedule-item-meta">结束：${endAt}</div>
            <div class="schedule-item-meta">备注：${note}</div>
          </div>
        `;
      }).join('');
    }

    async function ensureLoggedInUser() {
      if (currentUser) return currentUser;

      const { data, error } = await supabase.auth.getUser();

      if (error) {
        setMsg('获取当前用户失败：' + error.message);
        return null;
      }

      currentUser = data.user ?? null;
      return currentUser;
    }

    async function loadSchedules() {
      const user = await ensureLoggedInUser();

      if (!user) {
        setMsg('当前未登录');
        setScheduleOutput('当前未登录，暂无可读取数据');
        renderScheduleList([]);
        return;
      }

      const { data, error } = await supabase
        .from('schedule_items')
        .select('*')
        .eq('user_id', user.id)
        .order('start_at', { ascending: false })
        .limit(20);

      if (error) {
        setMsg('读取日程失败：' + error.message);
        setScheduleOutput(JSON.stringify({ error }, null, 2));
        renderScheduleList([]);
        return;
      }

      setMsg(`读取成功，共 ${data.length} 条`);
      setScheduleOutput(JSON.stringify(data, null, 2));
      renderScheduleList(data);
    }

    try {
      setMsg('正在初始化…');
      appendDebug('开始初始化表单与事件');
      if (showPasswordEl) {
        showPasswordEl.addEventListener('change', () => {
          passwordEl.type = showPasswordEl.checked ? 'text' : 'password';
        });
      } else {
        appendDebug('（提示）未找到 #showPassword，已跳过「密码可见」绑定');
      }
      loadRememberedEmail();
      setDefaultScheduleForm();

      loginBtn.addEventListener('click', async () => {
        appendDebug('登录按钮：click 已触发');
        setMsg('已收到点击，正在校验输入…');
        msgEl.classList.remove('msg-error');

        try {
          loginBtn.disabled = true;

          const email = emailEl.value.trim();
          const password = passwordEl.value.trim();

          if (!email || !password) {
            setMsg('请先输入邮箱和密码', 'error');
            appendDebug('校验失败：邮箱或密码为空');
            return;
          }

          appendDebug(`准备请求 signInWithPassword，邮箱长度=${email.length}`);
          setMsg('正在连接 Supabase 登录接口…');

          const { data, error } = await supabase.auth.signInWithPassword({
            email,
            password
          });

          const errInfo = error
            ? JSON.stringify({
                message: error.message,
                name: error.name,
                status: error.status,
                code: error.code
              })
            : 'null';
          appendDebug(`signInWithPassword 返回: error=${errInfo}`);

          if (error) {
            const extra =
              error.status != null ? `（状态码 ${error.status}）` : '';
            setMsg('登录失败：' + error.message + extra, 'error');
            return;
          }

          if (rememberMeEl?.checked) {
            localStorage.setItem(REMEMBER_EMAIL_KEY, email);
          } else {
            localStorage.removeItem(REMEMBER_EMAIL_KEY);
          }

          currentUser = data.user ?? data.session?.user ?? null;
          appendDebug(
            '登录成功，即将跳转 MindTask.html，user.id=' +
              (currentUser?.id || '(无)')
          );
          setMsg('登录成功，正在跳转…');
          window.location.href = AFTER_LOGIN;
        } catch (e) {
          console.error(e);
          appendDebug(`登录过程异常: ${e?.message || e}\n${e?.stack || ''}`);
          setMsg('登录过程脚本异常：' + (e?.message || e), 'error');
        } finally {
          loginBtn.disabled = false;
        }
      });
      appendDebug('已绑定：登录按钮 click 监听器');

      logoutBtn.addEventListener('click', async () => {
        const { error } = await supabase.auth.signOut();

        if (error) {
          setMsg('退出失败：' + error.message);
          return;
        }

        currentUser = null;
        renderScheduleList([]);
        setScheduleOutput('');
        setMsg('已退出登录');
      });

      addScheduleBtn.addEventListener('click', async () => {
        setMsg('准备新增测试日程...');

        const user = await ensureLoggedInUser();

        if (!user) {
          setMsg('请先登录后再新增日程');
          return;
        }

        const title = titleEl.value.trim() || `测试日程 ${new Date().toLocaleString('zh-CN')}`;
        const note = noteEl.value.trim() || '';

        let startAt = startAtEl.value;
        let endAt = endAtEl.value;

        // 用户没填时，自动补默认值
        if (!startAt) {
          const now = new Date();
          startAt = formatForDatetimeLocal(now);
          startAtEl.value = startAt;
        }

        if (!endAt) {
          const oneHourLater = new Date(new Date(startAt).getTime() + 60 * 60 * 1000);
          endAt = formatForDatetimeLocal(oneHourLater);
          endAtEl.value = endAt;
        }

        // 转成数据库更喜欢的 ISO 时间字符串
        const startAtIso = toIsoString(startAt);
        const endAtIso = toIsoString(endAt);

        if (!startAtIso) {
          setMsg('开始时间不能为空');
          return;
        }

        const payload = {
          user_id: user.id,
          title: title,
          start_at: startAtIso,
          end_at: endAtIso,
          note: note
        };

        const { data, error } = await supabase
          .from('schedule_items')
          .insert([payload])
          .select();

        if (error) {
          setMsg('新增日程失败：' + error.message);
          setScheduleOutput(JSON.stringify({ payload, error }, null, 2));
          return;
        }

        setMsg('新增测试日程成功');
        setScheduleOutput(JSON.stringify(data, null, 2));
        await loadSchedules();
      });

      readScheduleBtn.addEventListener('click', async () => {
        setMsg('正在读取我的日程...');
        await loadSchedules();
      });

      supabase.auth.onAuthStateChange((event) => {
        if (event === 'SIGNED_IN') {
          setTimeout(() => {
            window.location.href = AFTER_LOGIN;
          }, 0);
        }
      });

      appendDebug('调用 getSession() …');
      const { data: sessionData, error: sessionError } =
        await supabase.auth.getSession();
      appendDebug(
        sessionError
          ? `getSession 错误: ${sessionError.message}`
          : sessionData?.session?.user
            ? 'getSession：已有会话，将跳转 MindTask'
            : 'getSession：无会话，可登录'
      );
      if (sessionError) {
        setMsg('会话检查失败：' + sessionError.message, 'error');
      } else if (sessionData.session?.user) {
        window.location.href = AFTER_LOGIN;
      } else {
        currentUser = null;
        renderScheduleList([]);
        setScheduleOutput('当前未登录，暂无可读取数据');
        setMsg('当前未登录，可以输入账号密码后点击登录');
      }
    } catch (err) {
      appendDebug(`初始化 try 异常: ${err?.message}\n${err?.stack || ''}`);
      setMsg('JS 报错了：' + (err?.message || err), 'error');
      console.error(err);
    }
    })();
  </script>
</body>
</html>

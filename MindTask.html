function startQuickSelect(id,field,targetClass,options){
  let el=document.querySelector('#nd-'+id+' .'+targetClass);
  if(!el)return;
  let node=findNode(curProj().root,id);if(!node)return;
  let oldVal=node[field];
  let sel=document.createElement('select');
  sel.style.cssText='font-size:10px;padding:1px 4px;border:1px solid var(--line);border-radius:4px;background:var(--card);color:var(--text)';
  options.forEach(op=>{
    let o=document.createElement('option');
    o.value=op.value;
    o.textContent=op.label;
    sel.appendChild(o);
  });
  sel.value=oldVal;
  let done=false;
  let finish=(commit)=>{
    if(done)return;
    done=true;
    if(commit&&sel.value!==oldVal){
      epUpdate(field,sel.value);
    }else{
      renderAll();
    }
  };
  sel.onchange=()=>finish(true);
  sel.onblur=()=>finish(true);
  sel.onkeydown=(e)=>{
    if(e.key==='Enter'){e.preventDefault();finish(true);}
    if(e.key==='Escape'){e.preventDefault();finish(false);}
  };
  el.textContent='';
  el.appendChild(sel);
  sel.focus();
}

/* ===== CANVAS PAN/ZOOM ===== */
function isSyntheticMouseFromTouch(e){
  return !!(e&&e.sourceCapabilities&&e.sourceCapabilities.firesTouchEvents);
}
function panStart(e){
  if(isSyntheticMouseFromTouch(e))return;
  let midPan=e.button===1;
  if(!midPan&&e.target.closest('.node'))return;
  if(midPan)e.preventDefault();
  isPanning=true;panSX=e.clientX;panSY=e.clientY;panOX=panX;panOY=panY;
  let mm=(ev)=>{panX=panOX+(ev.clientX-panSX);panY=panOY+(ev.clientY-panSY);updateCanvasTransform()};
  let mu=()=>{isPanning=false;document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu)};
  document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
}
function onZoom(e){
  e.preventDefault();
  let rect=document.getElementById('canvasWrap').getBoundingClientRect();
  let mx=e.clientX-rect.left, my=e.clientY-rect.top;
  let dz;
  if(e.ctrlKey){
    dz=-e.deltaY*0.0036;
    dz=Math.max(-0.016,Math.min(0.016,dz));
  }else if(e.deltaMode===0){
    let dy=Number(e.deltaY);
    let abs=Math.abs(dy);
    // Win11 Chrome/Edge 常见：物理滚轮仍用 deltaMode=0，整档 deltaY≈100/120，旧系数会被 ±0.022 压扁
    let coarseWheel=Number.isInteger(dy)&&abs>=50&&abs<=600;
    if(coarseWheel){
      dz=-dy*0.0028;
      dz=Math.max(-0.14,Math.min(0.14,dz));
    }else{
      dz=-dy*0.00056;
      dz=Math.max(-0.022,Math.min(0.022,dz));
    }
  }else{
    dz=e.deltaY>0?-0.1:0.1;
    if(e.deltaMode===1)dz*=12;
    if(e.deltaMode===2)dz*=32;
    dz*=6;
  }
  let nz=Math.max(0.2,Math.min(3,zoom+dz));
  panX=mx-(mx-panX)*(nz/zoom);
  panY=my-(my-panY)*(nz/zoom);
  zoom=nz;updateCanvasTransform();
}
function zoomBy(d){let nz=Math.max(0.2,Math.min(3,zoom+d));zoom=nz;updateCanvasTransform()}
function dblClickCanvas(e){if(e.target.closest('.node'))return;centerRoot()}

// Click blank to close right panel (ignore drags)
let blankDown=null;
document.getElementById('canvasWrap').addEventListener('mousedown',(e)=>{
  if(isSyntheticMouseFromTouch(e)){blankDown=null;return}
  if(e.button!==0){blankDown=null;return}
  if(e.target.closest('.node')){blankDown=null;return}
  blankDown={x:e.clientX,y:e.clientY};
});
document.getElementById('canvasWrap').addEventListener('click',(e)=>{
  if(e.target.closest('.node'))return;
  if(!blankDown){closePanel();return}
  let dx=Math.abs(e.clientX-blankDown.x),dy=Math.abs(e.clientY-blankDown.y);
  if(dx+dy<6)closePanel();
  blankDown=null;
});

function attachCanvasTouchDoc(){
  if(canvasTouchDocBound)return;
  canvasTouchDocBound=true;
  document.addEventListener('touchmove',canvasTouchDocMove,{passive:false});
  document.addEventListener('touchend',canvasTouchDocEnd,true);
  document.addEventListener('touchcancel',canvasTouchDocEnd,true);
}
function detachCanvasTouchDoc(){
  if(!canvasTouchDocBound)return;
  canvasTouchDocBound=false;
  document.removeEventListener('touchmove',canvasTouchDocMove,{passive:false});
  document.removeEventListener('touchend',canvasTouchDocEnd,true);
  document.removeEventListener('touchcancel',canvasTouchDocEnd,true);
}
function canvasTouchDocMove(e){
  if(e.touches.length===2&&canvasTouchPinch){
    e.preventDefault();
    let t0=e.touches[0],t1=e.touches[1];
    let dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    let midVX=(t0.clientX+t1.clientX)/2,midVY=(t0.clientY+t1.clientY)/2;
    panX+=midVX-canvasTouchPinch.lastMidVX;
    panY+=midVY-canvasTouchPinch.lastMidVY;
    let rect=document.getElementById('canvasWrap').getBoundingClientRect();
    let midX=midVX-rect.left,midY=midVY-rect.top;
    let prevD=canvasTouchPinch.prevDist;
    if(prevD>4&&dist>4){
      let ratio=dist/prevD;
      if(Math.abs(ratio-1)>0.002){
        let nz=Math.max(0.2,Math.min(3,zoom*ratio));
        panX=midX-(midX-panX)*(nz/zoom);
        panY=midY-(midY-panY)*(nz/zoom);
        zoom=nz;
      }
    }
    canvasTouchPinch.prevDist=dist;
    canvasTouchPinch.lastMidVX=midVX;
    canvasTouchPinch.lastMidVY=midVY;
    updateCanvasTransform();
    return;
  }
  if(e.touches.length===1&&canvasTouchPan){
    e.preventDefault();
    let t=e.touches[0];
    panX=canvasTouchPan.ox+(t.clientX-canvasTouchPan.sx);
    panY=canvasTouchPan.oy+(t.clientY-canvasTouchPan.sy);
    updateCanvasTransform();
  }
}
function canvasTouchDocEnd(e){
  if(e.touches.length===0){
    detachCanvasTouchDoc();
    canvasTouchPan=null;
    canvasTouchPinch=null;
    return;
  }
  if(e.touches.length===1){
    canvasTouchPinch=null;
    let t=e.touches[0];
    canvasTouchPan={sx:t.clientX,sy:t.clientY,ox:panX,oy:panY};
  }
}
function canvasWrapTouchStart(e){
  if(e.touches.length===2){
    canvasTouchPan=null;
    let t0=e.touches[0],t1=e.touches[1];
    let dist=Math.hypot(t1.clientX-t0.clientX,t1.clientY-t0.clientY);
    let midVX=(t0.clientX+t1.clientX)/2,midVY=(t0.clientY+t1.clientY)/2;
    canvasTouchPinch={prevDist:Math.max(dist,10),lastMidVX:midVX,lastMidVY:midVY};
    attachCanvasTouchDoc();
    e.preventDefault();
    return;
  }
  if(e.touches.length===1){
    if(e.target.closest('.node')){
      canvasTouchPan=null;
      canvasTouchPinch=null;
      return;
    }
    canvasTouchPinch=null;
    let t=e.touches[0];
    canvasTouchPan={sx:t.clientX,sy:t.clientY,ox:panX,oy:panY};
    attachCanvasTouchDoc();
  }
}
(function bindCanvasWrapGestures(){
  let wrap=document.getElementById('canvasWrap');
  if(!wrap)return;
  wrap.addEventListener('wheel',onZoom,{passive:false});
  wrap.addEventListener('touchstart',canvasWrapTouchStart,{passive:false});
})();

function fitCanvas(){
  let wrap=document.getElementById('canvasWrap');
  let ww=wrap.clientWidth,wh=wrap.clientHeight;
  let idsForView = branchHighlightHits.size>0 ? Array.from(branchHighlightHits) : Object.keys(nodePositions);
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  idsForView.forEach(id=>{
    let p=nodePositions[id];
    if(!p)return;
    minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);
    maxX=Math.max(maxX,p.x+p.w);maxY=Math.max(maxY,p.y+p.h);
  });
  if(!isFinite(minX))return;
  let tw=maxX-minX+80,th=maxY-minY+80;
  zoom=Math.min(1.2,Math.min(ww/tw,wh/th));
  panX=(ww-tw*zoom)/2-minX*zoom+40*zoom;
  panY=(wh-th*zoom)/2-minY*zoom+40*zoom;
  updateCanvasTransform();
}
function centerRoot(){
  let wrap=document.getElementById('canvasWrap');
  let ww=wrap.clientWidth,wh=wrap.clientHeight;
  if(selectedId){
    let p=nodePositions[selectedId];
    if(p){
      let cx=p.x+p.w/2,cy=p.y+p.h/2;
      panX=ww/2-cx*zoom;
      panY=wh/2-cy*zoom;
      updateCanvasTransform();
      return;
    }
  }
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  Object.keys(nodePositions).forEach(id=>{
    let p=nodePositions[id];
    if(!p)return;
    minX=Math.min(minX,p.x);minY=Math.min(minY,p.y);
    maxX=Math.max(maxX,p.x+p.w);maxY=Math.max(maxY,p.y+p.h);
  });
  if(!isFinite(minX))return;
  let cx=(minX+maxX)/2,cy=(minY+maxY)/2;
  panX=ww/2-cx*zoom;
  panY=wh/2-cy*zoom;
  updateCanvasTransform();
}

function collapseAll(){let r=curProj().root;walkAll(r,n=>{if(n!==r&&n.children.length)n.collapsed=true});save();renderAllStable();setTimeout(fitCanvas,50)}

function nodeMatchesStatusFilters(n,tIso){
  if(!statusFilters.size)return true;
  let es=getEffectiveStatus(n);
  for(let val of statusFilters){
    if(val==='overdue'){
      if(n.dueDate&&n.dueDate<tIso&&!isFinishedStatus(es))return true;
    }else if(es===val)return true;
  }
  return false;
}
function nodeMatchesPriorityFilters(n){
  if(!priorityFilters.size)return true;
  return priorityFilters.has(n.priority);
}
function updateStatusFilterButton(){
  let btn=document.getElementById('statusFilterBtn');
  if(!statusFilters.size){btn.classList.remove('active');btn.textContent='筛选状态 \u25BE';return}
  btn.classList.add('active');
  let names=[];
  statusFilters.forEach(v=>{
    if(v==='doing')names.push('进行中');
    else if(v==='todo')names.push('未开始');
    else if(v==='waiting')names.push('跟进中');
    else if(v==='blocked')names.push('阻塞中');
    else if(v==='scheduled')names.push('已排期');
    else if(v==='done')names.push('已完成');
    else if(v==='stopped')names.push('已停止');
    else if(v==='overdue')names.push('已逾期');
  });
  btn.textContent=names.join('+')+' \u25BE';
}
function updatePriorityFilterButton(){
  let btn=document.getElementById('priorityFilterBtn');
  if(!priorityFilters.size){btn.classList.remove('active');btn.textContent='筛选优先级 \u25BE';return}
  btn.classList.add('active');
  let names=[];
  priorityFilters.forEach(v=>{
    if(v==='high')names.push('高');
    else if(v==='medium')names.push('中');
    else if(v==='low')names.push('低');
  });
  btn.textContent=names.join('+')+' \u25BE';
}
function addFilterAncestors(root,directIds){
  directIds.forEach(id=>{
    let find=(node,trail)=>{
      if(node.id===id){trail.forEach(t=>filterHits.add(t));return true}
      for(let c of node.children){if(find(c,[...trail,node.id]))return true}
      return false;
    };
    find(root,[]);
  });
}
function applyFilters(){
  statusFilters.clear();
  document.querySelectorAll('#statusFilterDrop input.filter-value:checked').forEach(cb=>{statusFilters.add(cb.value)});
  priorityFilters.clear();
  document.querySelectorAll('#priorityFilterDrop input.filter-value:checked').forEach(cb=>{priorityFilters.add(cb.value)});
  updateStatusFilterButton();
  updatePriorityFilterButton();
  filterHits.clear();
  if(!statusFilters.size&&!priorityFilters.size){renderAll();return}
  let tIso=todayISO();
  let root=curProj().root;
  walkAll(root,n=>{
    if(nodeMatchesStatusFilters(n,tIso)&&nodeMatchesPriorityFilters(n))filterHits.add(n.id);
  });
  let directIds=[...filterHits];
  let statusLink=document.getElementById('statusLinkParentCb').checked;
  let priorityLink=document.getElementById('priorityLinkParentCb').checked;
  if(statusFilters.size&&statusLink)addFilterAncestors(root,directIds);
  if(priorityFilters.size&&priorityLink)addFilterAncestors(root,directIds);
  renderAll();
  scheduleUiPrefsSync();
}

function onSearch(){
  let q=document.getElementById('searchInput').value.trim().toLowerCase();
  let res=document.getElementById('searchResults');
  searchHits.clear();
  if(!q){res.style.display='none';renderAll();scheduleUiPrefsSync();return}
  let hits=[];
  walkAll(curProj().root,n=>{
    if(n.title.toLowerCase().includes(q)||n.note.toLowerCase().includes(q)){
      hits.push(n);searchHits.add(n.id);
    }
  });
  // Also add ancestors of hits
  let ancestors=new Set();
  searchHits.forEach(id=>{
    let path=[];
    let find=(node,trail)=>{
      if(node.id===id){trail.forEach(t=>ancestors.add(t));return true}
      for(let c of node.children){if(find(c,[...trail,node.id]))return true}
      return false;
    };
    find(curProj().root,[]);
  });
  ancestors.forEach(id=>searchHits.add(id));
  
  res.innerHTML='';
  if(hits.length===0){res.style.display='none';renderAll();scheduleUiPrefsSync();return}
  hits.slice(0,10).forEach(n=>{
    let d=document.createElement('div');d.className='sr-item';
    let t=document.createElement('div');t.textContent=n.title;t.style.fontWeight='600';t.style.fontSize='13px';
    let p=document.createElement('div');p.className='sr-path';
    let path=getPath(curProj().root,n.id,[]);
    p.textContent=path?path.join(' > '):'';
    d.appendChild(t);d.appendChild(p);
    d.onclick=()=>{
      expandAncestorsToNode(curProj().root,n.id);
      save();renderAll();
      // Scroll to node
      let np=nodePositions[n.id];
      if(np){
        let wrap=document.getElementById('canvasWrap');
        panX=wrap.clientWidth/2-(np.x+np.w/2)*zoom;
        panY=wrap.clientHeight/2-(np.y+np.h/2)*zoom;
        updateCanvasTransform();
      }
      selectNode(n.id);
      res.style.display='none';
    };
    res.appendChild(d);
  });
  res.style.display='block';
  renderAll();
  scheduleUiPrefsSync();
}

function doExportData(){

  a.download='task-mindmap-'+new Date().toISOString().slice(0,10)+'.taskmap.json';
  a.click();URL.revokeObjectURL(a.href);
}
function doImportData(){
  closeMenu();
  let input=document.createElement('input');input.type='file';input.accept='.json,.taskmap.json';
  input.onchange=()=>{
    let file=input.files[0];if(!file)return;
    let reader=new FileReader();
    reader.onload=async ()=>{
      try{
        let data=JSON.parse(reader.result);
        let err=validateImport(data);
        if(err){alert('导入失败：\n'+err);return}
        if(!await showConfirmModal({
          title:'导入并覆盖当前项目',
          message:'导入后将替换当前项目「'+curProj().name+'」的数据，是否继续？',
          confirmText:'继续导入',
          cancelText:'取消',
          confirmVariant:'primary'
        }))return;
        let proj=curProj();
        proj.name=data.project.title||proj.name;
        proj.root=migrateNode(data.project.root);
        selectedId=null;closePanel();
        save();renderProjects();renderAll();setTimeout(fitCanvas,50);
        alert('导入成功！');
      }catch(e){alert('导入失败：JSON格式错误\n'+e.message)}
    };
    reader.readAsText(file);
  };
  input.click();
}
function validateImport(data){
  if(!data||typeof data!=='object')return '文件内容不是有效JSON对象';
  if(data.app!=='task-mindmap')return '文件标识不正确（缺少app:task-mindmap）';
  if(!data.schemaVersion)return '缺少schemaVersion字段';
  if(data.schemaVersion>1)return '数据版本(v'+data.schemaVersion+')高于当前支持版本(v1)，请升级应用';
  if(!data.project||!data.project.root)return '缺少project.root数据';
  let ids=new Set();
  let nodeErr=validateNode(data.project.root,ids);
  if(nodeErr)return nodeErr;
  return null;
}
function validateNode(node,ids){
  if(!node||typeof node!=='object')return '存在无效节点';
  if(!node.id)return '存在缺少id的节点';
  if(ids.has(node.id))return '节点ID重复: '+node.id;
  ids.add(node.id);
  if(typeof node.title!=='string'&&node.title!==undefined)return '节点 '+node.id+' 的title不是字符串';
  if(node.status&&!['todo','doing','waiting','blocked','scheduled','done','stopped'].includes(node.status))return '节点 '+node.id+' 的status值非法: '+node.status;
  if(node.priority&&!['low','medium','high'].includes(node.priority))return '节点 '+node.id+' 的priority值非法: '+node.priority;
  if(node.dueDate&&node.dueDate!==''&&!/^\d{4}-\d{2}-\d{2}$/.test(node.dueDate))return '节点 '+node.id+' 的日期格式非法: '+node.dueDate;
  if(node.children){
    if(!Array.isArray(node.children))return '节点 '+node.id+' 的children不是数组';
    for(let c of node.children){let e=validateNode(c,ids);if(e)return e}
  }
  return null;
}
function migrateNode(n){
  return {
    id:n.id||uid(),
    title:n.title||'未命名',
    note:n.note||'',
    status:['todo','doing','waiting','blocked','scheduled','done','stopped'].includes(n.status)?n.status:'todo',
    priority:['low','medium','high'].includes(n.priority)?n.priority:'medium',
    dueDate:n.dueDate||'',
    collapsed:!!n.collapsed,
    pausedPrevStatus:['todo','doing','waiting','blocked','scheduled','done','stopped'].includes(n.pausedPrevStatus)?n.pausedPrevStatus:'',
    pausedBy:n.pausedBy||'',
    children:(n.children||[]).map(c=>migrateNode(c))
  };
}

document.addEventListener('keydown',(e)=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();return}
  if((e.ctrlKey||e.metaKey)&&(e.key==='Z'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();return}
  if(e.key==='Escape'){multiSelected.clear();closePanel();searchHits.clear();statusFilters.clear();priorityFilters.clear();filterHits.clear();clearFilterUI();document.getElementById('searchInput').value='';document.getElementById('searchResults').style.display='none';renderAll();return}
  if(!selectedId)return;
  if(e.key==='Tab'){e.preventDefault();addChild(selectedId)}
  else if(e.key==='Enter'){e.preventDefault();addSibling(selectedId)}
  else if(e.key==='F2'){e.preventDefault();startRename(selectedId)}
  else if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();deleteNode(selectedId)}
  else if(e.key==='ArrowUp'||e.key==='ArrowDown'||e.key==='ArrowLeft'||e.key==='ArrowRight'){
    e.preventDefault();
    let root=curProj().root;
    if(e.key==='ArrowLeft'){
      let par=findParent(root,selectedId,null);
      if(par){selectNode(par.id)}
    }else if(e.key==='ArrowRight'){
      let node=findNode(root,selectedId);
      if(node&&node.children.length){
        if(node.collapsed){node.collapsed=false;save();renderAll()}
        selectNode(node.children[0].id);
      }
    }else{
      let curPos=nodePositions[selectedId];
      if(curPos){
        let candidates=[];
        Object.entries(nodePositions).forEach(([id,pos])=>{
          if(pos.depth===curPos.depth&&id!==selectedId)candidates.push({id,pos});
        });
        candidates.sort((a,b)=>a.pos.y-b.pos.y);
        if(e.key==='ArrowUp'){
          let above=candidates.filter(c=>c.pos.y<curPos.y);
          if(above.length)selectNode(above[above.length-1].id);
        }
        if(e.key==='ArrowDown'){
          let below=candidates.filter(c=>c.pos.y>curPos.y);
          if(below.length)selectNode(below[0].id);
        }
      }
    }
  }
});

// Reliable double-click quick edit via event delegation (survives rerender)
document.getElementById('canvas').addEventListener('dblclick',(e)=>{
  let nodeEl=e.target.closest('.node');
  if(!nodeEl)return;
  if(e.target.closest('button')||e.target.closest('input')||e.target.closest('textarea')||e.target.closest('select'))return;
  if(e.target.closest('.t-note-hint'))return;
  let id=(nodeEl.id||'').replace('nd-','');
  if(id){
    e.stopPropagation();
    if(e.target.closest('.quick-status')){
      selectNode(id);
      startQuickSelect(id,'status','quick-status',[
        {value:'todo',label:'未开始'},
        {value:'doing',label:'进行中'},
        {value:'waiting',label:'跟进中'},
        {value:'blocked',label:'阻塞中'},
        {value:'scheduled',label:'已排期'},
        {value:'done',label:'已完成'},
        {value:'stopped',label:'已停止'}
      ]);
      return;
    }
    if(e.target.closest('.quick-priority')){
      selectNode(id);
      startQuickSelect(id,'priority','quick-priority',[
        {value:'high',label:'高'},
        {value:'medium',label:'中'},
        {value:'low',label:'低'}
      ]);
      return;
    }
    if(e.target.closest('.ntitle')){
      selectNode(id);
      startRename(id);
      return;
    }
    startRename(id);
  }
});

// Single-click on quick-edit targets still opens edit panel.
document.getElementById('canvas').addEventListener('click',(e)=>{
  let nodeEl=e.target.closest('.node');
  if(!nodeEl)return;
  if(!(e.target.closest('.ntitle')||e.target.closest('.quick-status')||e.target.closest('.quick-priority')))return;
  let id=(nodeEl.id||'').replace('nd-','');
  if(!id)return;
  e.stopPropagation();
  if(multiSelected.size>0)multiSelected.clear();
  selectNode(id);
});

function doExportMarkdown(){
  closeMenu();
  let proj=curProj();
  function nodeToMd(node,depth){
    let indent='  '.repeat(depth);
    let status=node.status==='done'?'[x]':node.status==='doing'?'[-]':'[ ]';
    let line=indent+'- '+status+' '+node.title;
    if(node.dueDate)line+=' 📅 '+node.dueDate;
    if(node.priority==='high')line+=' 🔴';
    if(node.note)line+='\n'+indent+'  > '+node.note.replace(/\n/g,'\n'+indent+'  > ');
    let lines=[line];
    node.children.forEach(c=>lines.push(nodeToMd(c,depth+1)));
    return lines.join('\n');
  }
  let md='# '+proj.name+'\n\n'+nodeToMd(proj.root,0);
  let blob=new Blob([md],{type:'text/markdown'});
  let a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=proj.name+'.md';
  a.click();URL.revokeObjectURL(a.href);
}
function batchSetStatus(status){
  let root=curProj().root;
  multiSelected.forEach(id=>{
    let n=findNode(root,id);
    if(n){
      n.status=status;
      if(status==='done')n.children.forEach(c=>setStatusCascade(c,'done',true));
    }
  });
  multiSelected.clear();
  save();renderAll();
}
async function batchDelete(){
  let root=curProj().root;
  let count=multiSelected.size;
  if(!await showConfirmModal({
    title:'批量删除节点',
    message:'确定删除选中的 '+count+' 个节点？',
    confirmText:'删除',
    cancelText:'取消'
  }))return;
  multiSelected.forEach(id=>{
    if(id===root.id)return;
    let par=findParent(root,id,null);
    if(par)par.children=par.children.filter(c=>c.id!==id);
  });
  multiSelected.clear();
  if(selectedId&&!findNode(root,selectedId)){selectedId=null;closePanel()}
  save();renderAll();
}

(async function bootAuth(){
  let { data, error }=await supabase.auth.getSession();
  if(error || !data?.session?.user){
    window.location.href=AFTER_LOGIN;
    return;
  }
  let session=data.session;
  await bootstrapFromCloud(session.user);
  lastSavedSnap=JSON.stringify(projects);
  applyTheme(currentThemeName);
  buildThemeMenu();
  applyBackgroundMode(currentBgMode);
  buildBackgroundMenu();
  applyProjectPanelCollapsedState();
  renderProjects();
  renderAll();
  if(!didRestoreProjectUi)setTimeout(fitCanvas,100);
  persistUiPrefsCache();
  window.addEventListener('resize',updateZoomCtrlPos);

  setupRealtimeSync(session.user.id);

  document.addEventListener('visibilitychange',onVisibilityChange);
  window.addEventListener('online',onOnline);
  window.addEventListener('offline',onOffline);
  window.addEventListener('beforeunload',onBeforeUnload);
  window.addEventListener('pagehide',onBeforeUnload);

  supabase.auth.onAuthStateChange((_event, sess) => {
    if(!sess){
      teardownRealtimeSync();
      window.location.href=AFTER_LOGIN;
    }else if(sess.user&&sess.user.id!==session.user.id){
      teardownRealtimeSync();
      setupRealtimeSync(sess.user.id);
    }
  });
})();

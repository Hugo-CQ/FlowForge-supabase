<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Supabase 登录排错页</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f4f6fb;
      color: #1f2937;
    }

    .wrap {
      width: min(700px, 92%);
      margin: 40px auto;
    }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 10px;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 14px;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 8px;
      font-size: 14px;
    }

    button:hover {
      opacity: 0.92;
    }

    .option-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 4px 0 12px;
      flex-wrap: wrap;
    }

    .option-row label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: normal;
      margin: 0;
    }

    .option-row input {
      width: auto;
      margin: 0;
      padding: 0;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    #scheduleOutput {
      margin-top: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 140px;
    }

    #scheduleList {
      margin-top: 10px;
    }

    .schedule-item {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      background: #fff;
      margin-bottom: 10px;
    }

    .schedule-item-title {
      margin: 0 0 8px;
      font-size: 16px;
      font-weight: 700;
    }

    .schedule-item-meta {
      margin: 4px 0;
      color: #374151;
      font-size: 14px;
    }

    #msg {
      margin-top: 16px;
      min-height: 24px;
      white-space: pre-wrap;
      font-weight: 600;
    }

    .box {
      margin-top: 20px;
      padding: 16px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fafafa;
    }

    .tip {
      font-size: 13px;
      color: #6b7280;
      margin-top: -8px;
      margin-bottom: 12px;
    }

    @media (max-width: 640px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Supabase 登录 + 日程测试页</h1>

      <label>邮箱</label>
      <input id="email" type="email" placeholder="请输入邮箱" />

      <label>密码</label>
      <input id="password" type="password" placeholder="请输入密码" />

      <div class="option-row">
        <label>
          <input id="rememberMe" type="checkbox" />
          记住我
        </label>
        <label>
          <input id="showPassword" type="checkbox" />
          密码可见
        </label>
      </div>

      <button id="loginBtn">登录测试</button>
      <button id="logoutBtn">退出登录</button>
      <button id="readScheduleBtn">读取我的日程</button>

      <div class="box">
        <h3 style="margin-top: 0;">新增测试日程</h3>

        <label>日程标题</label>
        <input id="title" type="text" placeholder="例如：和同事开会" />

        <div class="grid">
          <div>
            <label>开始时间</label>
            <input id="startAt" type="datetime-local" />
          </div>
          <div>
            <label>结束时间</label>
            <input id="endAt" type="datetime-local" />
          </div>
        </div>

        <label>备注</label>
        <textarea id="note" placeholder="可选，例如：讨论下周安排"></textarea>

        <div class="tip">如果你不填，系统会自动帮你生成一个测试日程。</div>

        <button id="addScheduleBtn">新增测试日程</button>
      </div>

      <div id="msg">页面已加载，但 JS 状态未知</div>

      <div class="box">
        <h3 style="margin-top: 0;">我的日程</h3>
        <div id="scheduleList">暂无日程</div>
      </div>

      <div class="box">
        <h3 style="margin-top: 0;">调试输出</h3>
        <pre id="scheduleOutput">日程读取结果会显示在这里</pre>
      </div>
    </div>
  </div>

  <script type="module">
    const msgEl = document.getElementById('msg');
    const scheduleOutputEl = document.getElementById('scheduleOutput');

    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const addScheduleBtn = document.getElementById('addScheduleBtn');
    const readScheduleBtn = document.getElementById('readScheduleBtn');
    const scheduleListEl = document.getElementById('scheduleList');

    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const rememberMeEl = document.getElementById('rememberMe');
    const showPasswordEl = document.getElementById('showPassword');

    const titleEl = document.getElementById('title');
    const startAtEl = document.getElementById('startAt');
    const endAtEl = document.getElementById('endAt');
    const noteEl = document.getElementById('note');

    const REMEMBER_EMAIL_KEY = 'flowforge_remember_email';

    let currentUser = null;
    let supabase = null;

    function setMsg(text) {
      msgEl.textContent = text;
    }

    function setScheduleOutput(text) {
      scheduleOutputEl.textContent = text;
    }

    function loadRememberedEmail() {
      const rememberedEmail = localStorage.getItem(REMEMBER_EMAIL_KEY);
      if (rememberedEmail) {
        emailEl.value = rememberedEmail;
        rememberMeEl.checked = true;
      }
    }

    // 给 datetime-local 输入框设置默认时间
    function formatForDatetimeLocal(date) {
      const pad = (n) => String(n).padStart(2, '0');
      const year = date.getFullYear();
      const month = pad(date.getMonth() + 1);
      const day = pad(date.getDate());
      const hours = pad(date.getHours());
      const minutes = pad(date.getMinutes());
      return `${year}-${month}-${day}T${hours}:${minutes}`;
    }

    function setDefaultScheduleForm() {
      const now = new Date();
      const oneHourLater = new Date(now.getTime() + 60 * 60 * 1000);

      titleEl.value = `测试日程 ${now.toLocaleString('zh-CN')}`;
      startAtEl.value = formatForDatetimeLocal(now);
      endAtEl.value = formatForDatetimeLocal(oneHourLater);
      noteEl.value = '这是测试页自动生成的测试日程';
    }

    function toIsoString(localDatetimeValue) {
      if (!localDatetimeValue) return null;
      return new Date(localDatetimeValue).toISOString();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatDisplayTime(value) {
      if (!value) return '未设置';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '未设置';
      const pad = (n) => String(n).padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function renderScheduleList(items) {
      if (!Array.isArray(items) || items.length === 0) {
        scheduleListEl.innerHTML = '<div class="schedule-item-meta">暂无日程</div>';
        return;
      }

      scheduleListEl.innerHTML = items.map((item) => {
        const title = item.title ? escapeHtml(item.title) : '未命名日程';
        const startAt = formatDisplayTime(item.start_at);
        const endAt = item.end_at ? formatDisplayTime(item.end_at) : '未设置结束时间';
        const note = item.note ? escapeHtml(item.note) : '无备注';

        return `
          <div class="schedule-item">
            <h4 class="schedule-item-title">${title}</h4>
            <div class="schedule-item-meta">开始：${startAt}</div>
            <div class="schedule-item-meta">结束：${endAt}</div>
            <div class="schedule-item-meta">备注：${note}</div>
          </div>
        `;
      }).join('');
    }

    async function ensureLoggedInUser() {
      if (currentUser) return currentUser;

      const { data, error } = await supabase.auth.getUser();

      if (error) {
        setMsg('获取当前用户失败：' + error.message);
        return null;
      }

      currentUser = data.user ?? null;
      return currentUser;
    }

    async function loadSchedules() {
      const user = await ensureLoggedInUser();

      if (!user) {
        setMsg('当前未登录');
        setScheduleOutput('当前未登录，暂无可读取数据');
        renderScheduleList([]);
        return;
      }

      const { data, error } = await supabase
        .from('schedule_items')
        .select('*')
        .eq('user_id', user.id)
        .order('start_at', { ascending: false })
        .limit(20);

      if (error) {
        setMsg('读取日程失败：' + error.message);
        setScheduleOutput(JSON.stringify({ error }, null, 2));
        renderScheduleList([]);
        return;
      }

      setMsg(`读取成功，共 ${data.length} 条`);
      setScheduleOutput(JSON.stringify(data, null, 2));
      renderScheduleList(data);
    }

    showPasswordEl.addEventListener('change', () => {
      passwordEl.type = showPasswordEl.checked ? 'text' : 'password';
    });

    try {
      setMsg('JS 已启动，准备加载 Supabase...');
      loadRememberedEmail();
      setDefaultScheduleForm();

      const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
      setMsg('Supabase 库加载成功');

      const SUPABASE_URL = 'https://itguqtsgjliinrycnljm.supabase.co';
      const SUPABASE_ANON_KEY = 'sb_publishable__RYR3P-qfBC4GySYyPHm3Q_-5PssRBp';

      supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      setMsg('Supabase 客户端创建成功，按钮事件准备绑定');

      loginBtn.addEventListener('click', async () => {
        setMsg('按钮已经点到了，开始尝试登录...');

        const email = emailEl.value.trim();
        const password = passwordEl.value.trim();

        if (!email || !password) {
          setMsg('请先输入邮箱和密码');
          return;
        }

        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          setMsg('登录失败：' + error.message);
          return;
        }

        currentUser = data.user ?? data.session?.user ?? null;

        if (rememberMeEl.checked) {
          localStorage.setItem(REMEMBER_EMAIL_KEY, email);
        } else {
          localStorage.removeItem(REMEMBER_EMAIL_KEY);
        }

        setMsg(`登录成功，用户ID：${currentUser?.id ?? '未知'}`);
        await loadSchedules();
      });

      logoutBtn.addEventListener('click', async () => {
        const { error } = await supabase.auth.signOut();

        if (error) {
          setMsg('退出登录失败：' + error.message);
          return;
        }

        currentUser = null;
        renderScheduleList([]);
        setScheduleOutput('');
        setMsg('已退出登录');
      });

      addScheduleBtn.addEventListener('click', async () => {
        setMsg('准备新增测试日程...');

        const user = await ensureLoggedInUser();

        if (!user) {
          setMsg('请先登录后再新增日程');
          return;
        }

        const title = titleEl.value.trim() || `测试日程 ${new Date().toLocaleString('zh-CN')}`;
        const note = noteEl.value.trim() || '';

        let startAt = startAtEl.value;
        let endAt = endAtEl.value;

        // 用户没填时，自动补默认值
        if (!startAt) {
          const now = new Date();
          startAt = formatForDatetimeLocal(now);
          startAtEl.value = startAt;
        }

        if (!endAt) {
          const oneHourLater = new Date(new Date(startAt).getTime() + 60 * 60 * 1000);
          endAt = formatForDatetimeLocal(oneHourLater);
          endAtEl.value = endAt;
        }

        // 转成数据库更喜欢的 ISO 时间字符串
        const startAtIso = toIsoString(startAt);
        const endAtIso = toIsoString(endAt);

        if (!startAtIso) {
          setMsg('开始时间不能为空');
          return;
        }

        const payload = {
          user_id: user.id,
          title: title,
          start_at: startAtIso,
          end_at: endAtIso,
          note: note
        };

        const { data, error } = await supabase
          .from('schedule_items')
          .insert([payload])
          .select();

        if (error) {
          setMsg('新增日程失败：' + error.message);
          setScheduleOutput(JSON.stringify({ payload, error }, null, 2));
          return;
        }

        setMsg('新增测试日程成功');
        setScheduleOutput(JSON.stringify(data, null, 2));
        await loadSchedules();
      });

      readScheduleBtn.addEventListener('click', async () => {
        setMsg('正在读取我的日程...');
        await loadSchedules();
      });

      const { data: sessionData, error: sessionError } = await supabase.auth.getSession();
      if (sessionError) {
        setMsg('会话检查失败：' + sessionError.message);
      } else if (sessionData.session?.user) {
        currentUser = sessionData.session.user;
        setMsg('已检测到登录状态');
        await loadSchedules();
      } else {
        currentUser = null;
        renderScheduleList([]);
        setScheduleOutput('当前未登录，暂无可读取数据');
        setMsg('当前未登录');
      }
    } catch (err) {
      setMsg('JS 报错了：' + err.message);
      console.error(err);
    }
  </script>
</body>
</html>
